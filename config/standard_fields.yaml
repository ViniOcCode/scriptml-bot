# Standard field mappings for Mercado Livre Upload
# These mappings apply to ALL categories - standard product fields only
# Category-specific attributes are discovered dynamically from ML API

# Minimum confidence score for fuzzy matching (0.0 - 1.0)
min_confidence_threshold: 0.85

# Strategy when no match is found:
# - skip: Ignore the column
# - flag: Flag for review but continue
# - fail: Stop processing with error
on_unmatched: flag

# Rollout safety controls for publish/validate hardening gates.
# strict_warning_gate_mode: enforce | report_only
strict_warning_gate_mode: "enforce"

# Publish flow routing controls.
flow_routing:
  user_products_enabled: true
  blocked_behavior: "fail" # fail | fallback_legacy

# Image diagnostics gate controls.
image_diagnostics:
  gate_mode: "report_only" # enforce | report_only | disabled

# API validation repair is permanently enabled in code (always-on).

# Identifier fallback controls.
identifier_policy:
  auto_fill_empty_gtin_reason: true
  default_empty_gtin_reason_value_name: "teste"

# Core item fields that are ALWAYS required for every publication
# These are set automatically if not found in Excel
core_item_fields:
  # Required fields that must be present in the final item payload
  required:
    - title
    - price
    - currency_id
    - available_quantity
    - condition
    - listing_type_id

  # Default values for fields not mapped from Excel
  # These reduce the need to search/map common fields
  defaults:
    currency_id: "BRL"
    listing_type_id: "gold_special"
    buying_mode: "buy_it_now"
    channels:
      - "marketplace"
    item_condition:
      id: "ITEM_CONDITION"
      values:
        new:
          value_id: "2230284"
          value_name: "Novo"
        used:
          value_id: "2230581"
          value_name: "Usado"

    # Default sale terms (warranty) - Full ML API format
    sale_terms:
      - id: "WARRANTY_TYPE"
        name: "Tipo de garantia"
        value_id: null
        value_name: "Garantia do vendedor"
        value_struct: null
        values:
          - id: null
            name: "Garantia do vendedor"
            struct: null
        value_type: "list"
      - id: "WARRANTY_TIME"
        name: "Tempo de garantia"
        value_id: null
        value_name: "30 dias"
        value_struct:
          number: 30
          unit: "dias"
        values:
          - id: null
            name: "30 dias"
            struct:
              number: 30
              unit: "dias"
        value_type: "number_unit"

    # Default picture if none provided
    pictures: []

# Explicit column to attribute mappings (bypasses fuzzy matching)
# Use this when you know exactly which Excel column maps to which ML attribute
explicit_mappings:
  # Warranty fields - map directly to sale_terms with full ML API format
  "Tipo de garantia":
    target: "sale_terms"
    id: "WARRANTY_TYPE"
    name: "Tipo de garantia"
    value_name: "Garantia do vendedor"
    value_type: "list"

  "Tempo de garantia":
    target: "sale_terms"
    id: "WARRANTY_TIME"
    name: "Tempo de garantia"
    value_name: "30 dias"
    value_type: "number_unit"
    unit_from_column: "Unidade de tempo de garantia"
    value_struct:
      number: 30
      unit: "dias"

  "Tipo de anúncio":
    target: "listing_type_id"
    id: "gold_special"

  "Tipo do anúncio":
    target: "listing_type_id"
    id: "gold_special"

  "Tipo de anuncio":
    target: "listing_type_id"
    id: "gold_special"

  "Tipo do anuncio":
    target: "listing_type_id"
    id: "gold_special"

  #"Armação":
   # target: "attribute"
    #id: "INCLUDES_FRAME"

#  "Vidro":
 #   target: "attribute"
  #  id: "WITH_GLASS"

  #"Frases":
   # target: "attribute"
    #id: "WITH_PHRASES"

  # Dimension fields - automatically append units
  "Largura (cm)":
    target: "attribute"
    id: "WIDTH"
    unit_suffix: " cm"

  "Altura (cm)":
    target: "attribute"
    id: "HEIGHT"
    unit_suffix: " cm"

  "Profundidade (cm)":
    target: "attribute"
    id: "DEPTH"
    unit_suffix: " cm"

  # Weight field - automatically append units
  "Peso físico (kg) Embalagem com o produto dentro":
    target: "attribute"
    id: "WEIGHT"
    unit_suffix: " kg"

  # GTIN/EAN mapping
  "EAN / GTIN":
    target: "attribute"
    id: "GTIN"

  "Código de produtos universal":
    target: "attribute"
    id: "GTIN"

  "Codigo de produtos universal":
    target: "attribute"
    id: "GTIN"

  "ISBN":
    target: "attribute"
    id: "GTIN"

  "IBSN":
    target: "attribute"
    id: "GTIN"

  # Book-specific fields already handled by cache, but explicit helps
  #"Título do livro":
  #  target: "attribute"
  #  id: "BOOK_TITLE"

  #"Autor":
  #  target: "attribute"
  #  id: "AUTHOR"

  #"Editora do livro":
  #  target: "attribute"
  #  id: "BOOK_PUBLISHER"

  #"Gênero do livro":
  #  target: "attribute"
  #  id: "BOOK_GENRE"

  #"Idioma":
  #  target: "attribute"
  #  id: "LANGUAGE"

  #"Capa do livro":
  #  target: "attribute"
  #  id: "BOOK_COVER"

# Rule-based explicit mappings for normalized header variants
auto_explicit_mappings:
  - match:
      contains:
        - "peso fisico"
      excludes:
        - "peso liquido"
        - "peso bruto"
    mapping:
      target: "attribute"
      id: "WEIGHT"
      unit_suffix: " kg"

# Priority used when multiple GTIN columns are present in the same spreadsheet row.
gtin_source_priority:
  - "Código de produtos universal"
  - "EAN / GTIN"
  - "ISBN"
  - "IBSN"

# Standard product fields (same across all categories)
standard_fields:
  sku:
    description: "Product SKU/identifier"
    required: true
    patterns:
      - "sku"
      - "código"
      - "codigo"
      - "referência"
      - "referencia"
      - "cód. produto"
      - "cod. produto"
      - "ref."
      - "ref"
    exact_matches:
      - "SKU"
      - "sku"

  title:
    description: "Product title"
    required: true
    patterns:
      - "title"
      - "título"
      - "titulo"
      - "nome do produto"
      - "nome produto"
      - "produto"
    exact_matches:
      - "Title"
      - "Título"
      - "Titulo"
      - "TÍTULO"
    # Exclude patterns that are category-specific attributes
    exclude_patterns:
      - "título do livro"
      - "titulo do livro"
      - "título do item"
      - "titulo do item"
      - "título da peça"
      - "titulo da peça"

  description:
    description: "Product description"
    required: false
    patterns:
      - "description"
      - "descrição"
      - "descricao"
      - "descrição produto"
      - "descricao produto"
      - "detalhes"
    exact_matches:
      - "Descrição"
      - "Descricao"
      - "DESCRIÇÃO"

  price:
    description: "Product price"
    required: true
    patterns:
      - "price"
      - "preço"
      - "preco"
      - "valor"
      - "valor unitário"
      - "valor unitario"
      - "preço venda"
      - "preco venda"
    exact_matches:
      - "Price"
      - "Preço"
      - "Preco"
      - "PREÇO"
      - "Valor"
    # Lower confidence for "custo" as it might be cost, not price
    low_confidence_patterns:
      - pattern: "custo"
        confidence: 0.6
      - pattern: "custo produto"
        confidence: 0.6

  available_quantity:
    description: "Stock quantity"
    required: false
    default_value: 1
    patterns:
      - "available_quantity"
      - "quantidade"
      - "estoque"
      - "stock"
      - "qtd"
      - "qtd estoque"
      - "quantidade estoque"
    exact_matches:
      - "Available_quantity"
      - "Estoque"
      - "Quantidade"
      - "ESTOQUE"

  condition:
    description: "Product condition (new/used)"
    required: true
    patterns:
      - "condition"
      - "condição"
      - "condicao"
      - "estado"
      - "estado produto"
      - "novo/usado"
    exact_matches:
      - "Condition"
      - "Condição"
      - "Condicao"
      - "CONDIÇÃO"
    value_mappings:
      # Maps Portuguese values to ML API values
      "novo": "new"
      "new": "new"
      "0": "new"
      "usado": "used"
      "used": "used"
      "1": "used"
      "recondicionado": "used"

# Image-related fields
image_fields:
  fotos:
    description: "Image URLs or folder references"
    required: false
    patterns:
      - "fotos"
      - "imagens"
      - "photos"
      - "images"
      - "fotos produto"
      - "imagens produto"
    exact_matches:
      - "Fotos"
      - "FOTOS"
      - "Imagens"

# Fields to always exclude from attribute mapping
# (these are handled specially or are metadata)
excluded_columns:
  - "id"
  - "_id"
  - "data"
  - "data criação"
  - "data criacao"
  - "criado em"
  - "atualizado em"
  - "observações"
  - "observacoes"
  - "obs"
  - "notas"
  - "comentários"
  - "comentarios"

# Logging configuration for mapping process
logging:
  # Log level for successful mappings
  success_level: "info"  # debug, info, warning
  # Log level for low-confidence matches
  low_confidence_level: "warning"
  # Log level for unmatched columns
  unmatched_level: "warning"
  # Include similarity scores in logs
  log_scores: true
