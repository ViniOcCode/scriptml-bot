# Generic Column Mappings for Mercado Livre Upload
# These mappings apply to ALL categories - standard product fields only
# Category-specific attributes are discovered dynamically from ML API

# Minimum confidence score for fuzzy matching (0.0 - 1.0)
min_confidence_threshold: 0.85

# Strategy when no match is found:
# - skip: Ignore the column
# - flag: Flag for review but continue
# - fail: Stop processing with error
on_unmatched: flag

# Core item fields that are ALWAYS required for every publication
# These are set automatically if not found in Excel
core_item_fields:
  # Required fields that must be present in the final item payload
  required:
    - title
    - price
    - currency_id
    - available_quantity
    - condition
    - listing_type_id
  
  # Default values for fields not mapped from Excel
  # These reduce the need to search/map common fields
  defaults:
    currency_id: "BRL"
    listing_type_id: "gold_special"
    buying_mode: "buy_it_now"
    
    # Default sale terms (warranty) - Full ML API format
    sale_terms:
      - id: "WARRANTY_TYPE"
        name: "Tipo de garantia"
        value_id: null
        value_name: "Garantia do vendedor"
        value_struct: null
        values:
          - id: null
            name: "Garantia do vendedor"
            struct: null
        value_type: "list"
      - id: "WARRANTY_TIME"
        name: "Tempo de garantia"
        value_id: null
        value_name: "30 dias"
        value_struct:
          number: 30
          unit: "dias"
        values:
          - id: null
            name: "30 dias"
            struct:
              number: 30
              unit: "dias"
        value_type: "number_unit"
    
    # Default picture if none provided
    pictures: []

# Explicit column to attribute mappings (bypasses fuzzy matching)
# Use this when you know exactly which Excel column maps to which ML attribute
explicit_mappings:
  # Warranty fields - map directly to sale_terms with full ML API format
  "Tipo de garantia":
    target: "sale_terms"
    id: "WARRANTY_TYPE"
    name: "Tipo de garantia"
    value_name: "Garantia do vendedor"
    value_type: "list"
  
  "Tempo de garantia":
    target: "sale_terms"
    id: "WARRANTY_TIME"
    name: "Tempo de garantia"
    value_name: "30 dias"
    value_type: "number_unit"
    value_struct:
      number: 30
      unit: "dias"

  "Tipo de anúncio":
    target: "listing_type_id"
    id: "gold_special"
  
  # Dimension fields - automatically append units
  "Largura (cm)":
    target: "attribute"
    id: "WIDTH"
    unit_suffix: " cm"
  
  "Altura (cm)":
    target: "attribute"
    id: "HEIGHT"
    unit_suffix: " cm"
  
  "Profundidade (cm)":
    target: "attribute"
    id: "DEPTH"
    unit_suffix: " cm"
  
  # Weight field - automatically append units
  "Peso físico (kg) Embalagem com o produto dentro":
    target: "attribute"
    id: "WEIGHT"
    unit_suffix: " kg"
  
  # GTIN/EAN mapping
  "EAN / GTIN":
    target: "attribute"
    id: "GTIN"
  
  "ISBN":
    target: "attribute"
    id: "GTIN"
  
  # Book-specific fields already handled by cache, but explicit helps
  "Título do livro":
    target: "attribute"
    id: "BOOK_TITLE"
  
  "Autor":
    target: "attribute"
    id: "AUTHOR"
  
  "Editora do livro":
    target: "attribute"
    id: "BOOK_PUBLISHER"
  
  "Gênero do livro":
    target: "attribute"
    id: "BOOK_GENRE"
  
  "Idioma":
    target: "attribute"
    id: "LANGUAGE"
  
  "Capa do livro":
    target: "attribute"
    id: "BOOK_COVER"

# Standard product fields (same across all categories)
standard_fields:
  sku:
    description: "Product SKU/identifier"
    required: true
    patterns:
      - "sku"
      - "código"
      - "codigo"
      - "referência"
      - "referencia"
      - "cód. produto"
      - "cod. produto"
      - "ref."
      - "ref"
    exact_matches:
      - "SKU"
      - "sku"

  title:
    description: "Product title"
    required: true
    patterns:
      - "title"
      - "título"
      - "titulo"
      - "nome do produto"
      - "nome produto"
      - "produto"
    exact_matches:
      - "Title"
      - "Título"
      - "Titulo"
      - "TÍTULO"
    # Exclude patterns that are category-specific attributes
    exclude_patterns:
      - "título do livro"
      - "titulo do livro"
      - "título do item"
      - "titulo do item"
      - "título da peça"
      - "titulo da peça"

  description:
    description: "Product description"
    required: false
    patterns:
      - "description"
      - "descrição"
      - "descricao"
      - "descrição produto"
      - "descricao produto"
      - "detalhes"
    exact_matches:
      - "Descrição"
      - "Descricao"
      - "DESCRIÇÃO"

  price:
    description: "Product price"
    required: true
    patterns:
      - "price"
      - "preço"
      - "preco"
      - "valor"
      - "valor unitário"
      - "valor unitario"
      - "preço venda"
      - "preco venda"
    exact_matches:
      - "Price"
      - "Preço"
      - "Preco"
      - "PREÇO"
      - "Valor"
    # Lower confidence for "custo" as it might be cost, not price
    low_confidence_patterns:
      - pattern: "custo"
        confidence: 0.6
      - pattern: "custo produto"
        confidence: 0.6

  available_quantity:
    description: "Stock quantity"
    required: false
    default_value: 1
    patterns:
      - "available_quantity"
      - "quantidade"
      - "estoque"
      - "stock"
      - "qtd"
      - "qtd estoque"
      - "quantidade estoque"
    exact_matches:
      - "Available_quantity"
      - "Estoque"
      - "Quantidade"
      - "ESTOQUE"

  condition:
    description: "Product condition (new/used)"
    required: true
    patterns:
      - "condition"
      - "condição"
      - "condicao"
      - "estado"
      - "estado produto"
      - "novo/usado"
    exact_matches:
      - "Condition"
      - "Condição"
      - "Condicao"
      - "CONDIÇÃO"
    value_mappings:
      # Maps Portuguese values to ML API values
      "novo": "new"
      "new": "new"
      "0": "new"
      "usado": "used"
      "used": "used"
      "1": "used"
      "recondicionado": "used"

# Image-related fields
image_fields:
  fotos:
    description: "Image URLs or folder references"
    required: false
    patterns:
      - "fotos"
      - "imagens"
      - "photos"
      - "images"
      - "fotos produto"
      - "imagens produto"
    exact_matches:
      - "Fotos"
      - "FOTOS"
      - "Imagens"

# Fields to always exclude from attribute mapping
# (these are handled specially or are metadata)
excluded_columns:
  - "id"
  - "_id"
  - "data"
  - "data criação"
  - "data criacao"
  - "criado em"
  - "atualizado em"
  - "observações"
  - "observacoes"
  - "obs"
  - "notas"
  - "comentários"
  - "comentarios"

# Logging configuration for mapping process
logging:
  # Log level for successful mappings
  success_level: "info"  # debug, info, warning
  # Log level for low-confidence matches
  low_confidence_level: "warning"
  # Log level for unmatched columns
  unmatched_level: "warning"
  # Include similarity scores in logs
  log_scores: true

# =============================================================================
# SHIPPING CONFIGURATION
# =============================================================================
shipping:
  # Default shipping mode when none specified
  default_mode: "not_specified"
  
  # Mode priority for auto-selection (higher priority first)
  # me1 is prioritized over me2 as requested
  mode_priority:
    - "me1"
    - "me2"
  
  # Configuration for each shipping mode
  # Full ML API format support:
  # {
  #   "mode": "me2",
  #   "methods": [],
  #   "tags": ["mandatory_free_shipping"],
  #   "dimensions": null,
  #   "local_pick_up": false,
  #   "free_shipping": true,
  #   "logistic_type": "drop_off",
  #   "store_pick_up": false
  # }
  modes:
    not_specified:
      local_pick_up: true
      logistic_type: null
      methods: []
      tags: []
      dimensions: null
      free_shipping: false
      store_pick_up: false
    
    me1:
      # Mercado Envios mode 1 - Seller ships, ML handles delivery
      local_pick_up: false
      logistic_type: "drop_off"
      methods: []
      tags: []
      dimensions: null
      free_shipping: false
      store_pick_up: false
    
    me2:
      # Mercado Envios mode 2 - Full ML logistics
      local_pick_up: false
      logistic_type: "drop_off"
      methods: []
      tags: []
      dimensions: null
      free_shipping: true
      store_pick_up: false

# =============================================================================
# ATTRIBUTE CLASSIFICATION PATTERNS
# =============================================================================
attribute_classification:
  # Patterns for logistics attributes (shipping, packaging, dimensions)
  logistics_patterns:
    - "SELLER"
    - "PACKAGE"
    - "SHIPPING"
    - "WEIGHT"
    - "DIMENSION"
    - "LENGTH"
    - "WIDTH"
    - "HEIGHT"
    - "DIMENSIONS"
    - "SIZE_CM"
  
  # Patterns for commercial attributes (warranty, pricing, terms)
  commercial_patterns:
    - "WARRANTY"
    - "GARANTIA"
    - "PRICE"
    - "DISCOUNT"
    - "PAYMENT"
    - "FINANCING"
    - "INSTALLMENTS"
    - "COST"

# =============================================================================
# PROTECTED ATTRIBUTES
# =============================================================================
# Attributes that should never be dropped during sanitization
protected_attributes:
  # Dimensions - important for shipping calculations
  - "HEIGHT"
  - "WIDTH"
  - "LENGTH"
  - "WEIGHT"
  - "SELLER_PACKAGE_HEIGHT"
  - "SELLER_PACKAGE_WIDTH"
  - "SELLER_PACKAGE_LENGTH"
  - "SELLER_PACKAGE_WEIGHT"
  # Product identifiers (per official ML API)
  - "GTIN"
  - "ISBN"
  - "ITEM_CONDITION"
  - "BRAND"
  - "MODEL"
  # Important product features
  - "WITH_AUGMENTED_REALITY"
  - "IS_WRITTEN_IN_CAPITAL_LETTERS"
  - "WITH_COLORING_PAGES"
  - "WITH_INDEX"
  # Book-specific
  - "PAGES_NUMBER"
  - "BOOKS_NUMBER_PER_SET"
  - "BOOK_SIZE"

# =============================================================================
# SCORING WEIGHTS
# =============================================================================
scoring:
  # Base score for attributes
  base_score: 100
  
  # Penalties (subtracted from base score)
  penalties:
    optional_attribute: 10
    low_relevance: 20
    value_not_allowed: 30
    free_text_leakage: 40
    logistics_attribute: 50
  
  # Bonuses (added to base score)
  bonuses:
    required_attribute: 20
    high_relevance: 10
  
  # Minimum score threshold for keeping attributes
  min_score: 40

# =============================================================================
# SIMILARITY THRESHOLDS
# =============================================================================
similarity:
  # Threshold for considering values redundant (0.0 - 1.0)
  # Higher = more strict (only very similar values are considered redundant)
  redundancy_threshold: 0.9

# =============================================================================
# DIMENSION PATTERNS
# =============================================================================
dimension_patterns:
  # Keywords that indicate dimension attributes
  keywords:
    - "height"
    - "altura"
    - "width"
    - "largura"
    - "length"
    - "comprimento"
    - "depth"
    - "profundidade"
  
  # Regex patterns for dimension values
  numeric_only: '^\\s*\\d+(?:[\\.,]\\d+)?\\s*$'
  unit_marker: '\\b(cm|mm|m|in|pouce|polegadas)\\b'
  
  # Default unit to append when none specified
  default_unit: "cm"

# =============================================================================
# HEADER DETECTION PATTERNS
# =============================================================================
header_detection:
  # Column patterns for header detection (regex)
  column_patterns:
    sku:
      - "^sku$"
    title:
      - "^t[íi]tulo(?!\\s+do)"  # Match "Título" at start, but not "Título do livro"
    description:
      - "descri[çc][ãa]o"
    price:
      - "pre[çc]o"
    available_quantity:
      - "estoque"
    condition:
      - "condi[çc][ãa]o"
    isbn:
      - "isbn"
    gtin:
      - "gtin"
    ncm:
      - "ncm"
    cfop:
      - "cfop"
    origin:
      - "origem"
    cest:
      - "cest"
    fotos:
      - "fotos"
  
  # Row patterns to detect header row (pattern, weight)
  header_indicators:
    - pattern: "sku"
      weight: 5
    - pattern: "t[ií]tulo"
      weight: 4
    - pattern: "condi[cç][aã]o"
      weight: 3
    - pattern: "pre[cç]o"
      weight: 3
    - pattern: "estoque"
      weight: 2
    - pattern: "fotos"
      weight: 2
  
  # Validation limits
  max_cell_length: 100
  max_row_length: 800

# =============================================================================
# TEXT NORMALIZATION
# =============================================================================
text_normalization:
  # Character mappings for accent removal
  accent_map:
    'á': 'a'
    'à': 'a'
    'ã': 'a'
    'â': 'a'
    'ä': 'a'
    'é': 'e'
    'è': 'e'
    'ê': 'e'
    'ë': 'e'
    'í': 'i'
    'ì': 'i'
    'î': 'i'
    'ï': 'i'
    'ó': 'o'
    'ò': 'o'
    'õ': 'o'
    'ô': 'o'
    'ö': 'o'
    'ú': 'u'
    'ù': 'u'
    'û': 'u'
    'ü': 'u'
    'ç': 'c'
    'ñ': 'n'
    'ý': 'y'
    'ÿ': 'y'
