# =============================================================================
# HEADER DETECTION PATTERNS
# =============================================================================
header_detection:
  # Column patterns for header detection (regex)
  column_patterns:
    sku:
      - "^sku$"
    title:
      - "^t[íi]tulo(?!\\s+do)"  # Match "Título" at start, but not "Título do livro"
    description:
      - "descri[çc][ãa]o"
    price:
      - "pre[çc]o"
    available_quantity:
      - "estoque"
    condition:
      - "condi[çc][ãa]o"
    isbn:
      - "isbn"
    gtin:
      - "gtin"
    ncm:
      - "ncm"
    cfop:
      - "cfop"
    origin:
      - "origem"
    cest:
      - "cest"
    cost:
      - "custo"
    fotos:
      - "fotos"

  # Row patterns to detect header row (pattern, weight)
  header_indicators:
    - pattern: "sku"
      weight: 5
    - pattern: "t[ií]tulo"
      weight: 4
    - pattern: "condi[cç][aã]o"
      weight: 3
    - pattern: "pre[cç]o"
      weight: 3
    - pattern: "estoque"
      weight: 2
    - pattern: "fotos"
      weight: 2

  # Validation limits
  max_cell_length: 100
  max_row_length: 800
