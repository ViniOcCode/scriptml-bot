# publisher.example.yaml — copy to config/publisher.yaml and fill in your values.
# config/publisher.yaml is git-ignored (per-tenant, never commit real values).
#
# Publisher-owned settings for manifest/payload publishing policy.

auth:
  # Client ID from Mercado Livre Developer Portal
  # https://developers.mercadolivre.com.br/
  # Can also be stored in ./secrets/meli_client_id
  ml_client_id: ""

  # Client Secret - can also be stored in ./secrets/meli_client_secret
  ml_client_secret: ""

runtime:
  workspace_root: "./workspace"

seller:
  listing:
    allowed_types:
      - "gold_special"
      - "gold_pro"
    default_type: "gold_special"

  pricing:
    min_price: 5.00
    max_price: 999.00

  categories:
    blocked: []
    overrides: {}

  batch:
    human_review_required: false
    publish_inactive: true

