# seller.example.yaml — copy to config/seller.yaml and fill in your values.
# config/seller.yaml is git-ignored (per-tenant, never commit real values).
#
# seller.yaml controls three areas:
#   listing   — which listing types are allowed for this account
#   pricing   — price range constraints (hard floor, soft ceiling)
#   categories — blocked categories and per-category listing_type overrides
#   batch      — safety gates for batch publishing

seller:
  # -----------------------------------------------------------------------
  # listing: which listing_type_id values are allowed for this account.
  # The ML API will reject types not available for your subscription level.
  # -----------------------------------------------------------------------
  listing:
    allowed_types:
      - "gold_special"   # Most common for Mercado Livre Full sellers
      - "gold_pro"       # Premium listing
    default_type: "gold_special"

  # -----------------------------------------------------------------------
  # pricing: hard floor and soft ceiling.
  # Below min_price  → publish is BLOCKED (error).
  # Above max_price  → publish proceeds with a WARNING in the report.
  # -----------------------------------------------------------------------
  pricing:
    min_price: 5.00      # R$ — items below this are always blocked
    max_price: 999.00   # R$ — items above this generate a warning only

  # -----------------------------------------------------------------------
  # categories: per-category rules.
  # blocked  — category IDs that this seller never publishes to (error).
  # overrides — force a specific listing_type for a category, overriding
  #             whatever the payload contains (useful for category deals).
  # -----------------------------------------------------------------------
  categories:
    blocked: []           # e.g. ["MLB1234", "MLB5678"]
    overrides: {}         # e.g. MLB1234: "gold_pro"

  # -----------------------------------------------------------------------
  # batch: safety gates for publish-manifest.
  # human_review_required — when true, blocks runs where ml-builder
  #   emitted blocking/review-required category evidence in run_manifest.json.
  # publish_inactive — reserved for future use (publish as paused).
  # -----------------------------------------------------------------------
  batch:
    human_review_required: false
    publish_inactive: true
