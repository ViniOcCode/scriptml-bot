# =============================================================================
# SHIPPING CONFIGURATION
# =============================================================================
shipping:
  # Shipping policy toggles.
  # Mode/logistic/pickup/free_shipping payload fields are resolved at runtime from:
  # - Spreadsheet row headers (Forma de envio, Custo de envio, Retirar pessoalmente)
  # - Seller capabilities (/users/{id}/shipping_preferences)
  policy:
    non_blocking_codes:
      - "shipping.free_shipping.cost_exceeded"
      - "item.shipping.mandatory_free_shipping"
    mandatory_free_shipping_tags:
      - "mandatory_free_shipping"
    enforce_mandatory_free_shipping: true
    allow_runtime_tag_overrides: true
    allow_runtime_free_shipping_override: true
